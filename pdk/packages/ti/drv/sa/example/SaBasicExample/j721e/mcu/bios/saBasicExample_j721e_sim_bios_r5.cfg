/* load the usb generic cfg file that's shared between CCS and 
   makefile projects */
xdc.loadCapsule("../../../../../../../build/j721e/sysbios_r5f.cfg")

/* ================ application dependencies  ================ */

var devType              = "j721e"

/* CSL */
var Csl         		 = xdc.loadPackage('ti.csl');
Csl.Settings.deviceType  = devType;
Csl.Settings.libProfile  = "release";

/* Load the OSAL package */ 
var osType           = "tirtos";
var Osal             = xdc.loadPackage('ti.osal');
Osal.Settings.socType = "j721e"
Osal.Settings.osType = osType;

// Load the uart package
var Uart              = xdc.loadPackage('ti.drv.uart');
Uart.Settings.socType = devType;

// Load the I2C package - board package needs this to read EVM ID 
var I2c = xdc.loadPackage('ti.drv.i2c');
I2c.Settings.socType = devType;

/* Load the board package */
var Board = xdc.loadPackage('ti.board');
Board.Settings.boardName = "j721e_sim";

/* Load the sa package */
var Sa = xdc.loadPackage('ti.drv.sa');     
var saSettings = xdc.useModule('ti.drv.sa.Settings');
saSettings.deviceType = devType; 
saSettings.libProfile = "release";

/* Load the UDMA package */
/* UDMA */
var Udma         		 = xdc.loadPackage('ti.drv.udma');
Udma.Settings.socType  = devType;
Udma.Settings.libProfile  = "release";

/* Load the SCICLIENT package */
/* SCICLIENT */
var SciClient    		       = xdc.loadPackage('ti.drv.sciclient');
SciClient.Settings.socType     = devType;
SciClient.Settings.boardType   = Board.Settings.boardName;
SciClient.Settings.libProfile  = "release";


