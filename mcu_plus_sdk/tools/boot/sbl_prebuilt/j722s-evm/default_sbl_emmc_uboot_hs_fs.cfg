#-----------------------------------------------------------------------------#
#                                                                             #
#      DEFAULT CONFIGURATION FILE TO BE USED WITH THE FLASHWRITER SCRIPT      #
#                                                                             #
#-----------------------------------------------------------------------------#
#
# By default this config file,
# - points to pre-built flash writer, bootloader for this EVM
# - The application image points to relative path of the ipc rpmsg linux application image for this EVM
#   - Make sure this application is built before running this script
# - You can customized this config file to point to your own bootloader and/or application images
# - You can use --operation=flashverify-emmc if you just want to verify the flash contents and not flash the file.
#
# Flash command : python uart_uniflash.py -p {name of your main UART com port} --cfg={path to your edited config file}
#

--flash-writer=sbl_prebuilt/j722s-evm/sbl_uart_uniflash.release.hs_fs.tiimage

# When sending bootloader make sure to flash at offset 0x0. ROM expects bootloader at offset 0x0 of eMMC
--file=sbl_prebuilt/j722s-evm/sbl_emmc_hlos.release.hs_fs.tiimage --operation=flash-emmc --flash-offset=0x0

# Appimge
--file=../../tools/boot/hlos_prebuilt/j722s-evm/linux/linux_dev.appimage.hs_fs --operation=flash-emmc --flash-offset=0x80000

# U-boot img
--file=../../tools/boot/hlos_prebuilt/j722s-evm/linux/u-boot.img --operation=flash-emmc --flash-offset=0x280000
